<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HOTELS JULI - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="login-box">
      <h1>HOTELS, JULI</h1>
      <form action="#">
        <label for="email">Correo</label>
        <input type="email" id="email" placeholder="Ingrese su correo" required>
        
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="Ingrese su contraseña" required>
        
        <div class="social-login">
          <button type="button" class="social-btn">G</button>
          <button type="button" class="social-btn">F</button>
        </div>
        
        <div class="links">
          <a href="#">Registrarse</a>
          <a href="#">Recuperar Cuenta</a>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
